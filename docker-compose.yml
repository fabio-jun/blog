services:
  postgres:
    image: postgres:16
    container_name: yap_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env}
      POSTGRES_DB: blogdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yap-net

  redis:
    image: redis:7-alpine
    container_name: yap_redis
    ports:
      - "6379:6379"
    networks:
      - yap-net

  api:
    build:
      context: ./yap-api
      dockerfile: Dockerfile
    container_name: yap_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=blogdb;Username=postgres;Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env}
      - Jwt__Key=${JWT_KEY:?Set JWT_KEY in your local .env with a long random signing key}
      - Jwt__Issuer=BlogAPI
      - Jwt__Audience=BlogClient
      - Swagger__Enabled=true
      - Cloudinary__Url=${CLOUDINARY_URL:?Set CLOUDINARY_URL in your local .env with the rotated Cloudinary URL}
      - REDIS__CONNECTION=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure
    volumes:
      - uploads_data:/app/wwwroot/uploads
    networks:
      - yap-net

  client:
    build:
      context: ./yap-client
      dockerfile: Dockerfile
    container_name: yap_client
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - yap-net

networks:
  yap-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:

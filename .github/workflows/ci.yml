name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blogdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore back/src/Blog.API/Blog.API.csproj

      - name: Build
        run: dotnet build back/src/Blog.API/Blog.API.csproj --no-restore

      - name: Run tests
        run: dotnet test back/tests/Blog.Tests/Blog.Tests.csproj --no-build --verbosity normal

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        working-directory: front/client
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: front/client
        run: pnpm lint

      - name: Build
        working-directory: front/client
        run: pnpm build

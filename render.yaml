services:
  - type: web
    name: yap-api
    runtime: docker
    dockerfilePath: ./back/Dockerfile
    dockerContext: ./back
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: BlogAPI
      - key: Jwt__Audience
        value: BlogClient
      - key: Cors__AllowedOrigins__0
        sync: false
